<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4f52cc;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#6366f1" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Accent glow blob top-right -->
  <ellipse cx="1050" cy="120" rx="200" ry="150" fill="#6366f1" opacity="0.07"/>
  <!-- Accent glow blob bottom-left -->
  <ellipse cx="150" cy="520" rx="180" ry="120" fill="#4f46e5" opacity="0.06"/>

  <!-- Left panel: Logo + Text area -->
  <!-- Logo icon (line chart) -->
  <g transform="translate(80, 80)" filter="url(#softglow)">
    <rect width="52" height="52" rx="12" fill="#6366f1" opacity="0.2"/>
    <rect width="52" height="52" rx="12" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <polyline points="8,38 18,24 28,30 38,16 44,20" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="8" cy="38" r="2.5" fill="#6366f1"/>
    <circle cx="18" cy="24" r="2.5" fill="#6366f1"/>
    <circle cx="28" cy="30" r="2.5" fill="#6366f1"/>
    <circle cx="38" cy="16" r="2.5" fill="#6366f1"/>
    <circle cx="44" cy="20" r="2.5" fill="#6366f1"/>
  </g>

  <!-- App Title -->
  <text x="148" y="115" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#e2e8f0" letter-spacing="-0.5">Random Number Checker</text>

  <!-- Divider line under header -->
  <line x1="80" y1="150" x2="1120" y2="150" stroke="#2e3248" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#e2e8f0" letter-spacing="-1.5">Zufallszahlen analysieren</text>
  <text x="80" y="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#6366f1" letter-spacing="-1.5">und visualisieren.</text>

  <!-- Subtext -->
  <text x="80" y="358" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#8892a4" font-weight="400">Statistische Tests für PRNG-Algorithmen · Chi²-Test · Histogramm</text>

  <!-- Algorithm badges -->
  <g transform="translate(80, 390)">
    <rect width="110" height="32" rx="6" fill="#252836" stroke="#2e3248" stroke-width="1"/>
    <text x="55" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#8892a4" text-anchor="middle" font-weight="500">Math.random()</text>
  </g>
  <g transform="translate(202, 390)">
    <rect width="60" height="32" rx="6" fill="#252836" stroke="#2e3248" stroke-width="1"/>
    <text x="30" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#8892a4" text-anchor="middle" font-weight="500">LCG</text>
  </g>
  <g transform="translate(274, 390)">
    <rect width="90" height="32" rx="6" fill="#252836" stroke="#2e3248" stroke-width="1"/>
    <text x="45" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#8892a4" text-anchor="middle" font-weight="500">Xorshift32</text>
  </g>
  <g transform="translate(376, 390)">
    <rect width="55" height="32" rx="6" fill="#252836" stroke="#2e3248" stroke-width="1"/>
    <text x="27" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#8892a4" text-anchor="middle" font-weight="500">MT19937</text>
  </g>
  <g transform="translate(443, 390)">
    <rect width="95" height="32" rx="6" fill="#252836" stroke="#2e3248" stroke-width="1"/>
    <text x="47" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#8892a4" text-anchor="middle" font-weight="500">Middle-Square</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(80, 445)">
    <circle cx="8" cy="8" r="5" fill="#22c55e"/>
    <text x="20" y="13" font-family="system-ui, sans-serif" font-size="14" fill="#8892a4" font-weight="400">Chi²-Test bestanden</text>
  </g>
  <g transform="translate(220, 445)">
    <circle cx="8" cy="8" r="5" fill="#6366f1"/>
    <text x="20" y="13" font-family="system-ui, sans-serif" font-size="14" fill="#8892a4" font-weight="400">CSV-Export</text>
  </g>
  <g transform="translate(330, 445)">
    <circle cx="8" cy="8" r="5" fill="#f59e0b"/>
    <text x="20" y="13" font-family="system-ui, sans-serif" font-size="14" fill="#8892a4" font-weight="400">Dark / Light Mode</text>
  </g>

  <!-- Right panel: Histogram visualization -->
  <rect x="720" y="170" width="420" height="390" rx="12" fill="#1a1d27" stroke="#2e3248" stroke-width="1"/>

  <!-- Chart header -->
  <text x="740" y="205" font-family="system-ui, sans-serif" font-size="13" fill="#8892a4" font-weight="500">Häufigkeitsverteilung</text>
  <text x="1100" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1" text-anchor="end" font-weight="500">n = 10.000</text>

  <!-- Chart area -->
  <rect x="740" y="215" width="380" height="300" rx="6" fill="#252836" opacity="0.5"/>

  <!-- Y-axis labels -->
  <text x="748" y="236" font-family="system-ui, sans-serif" font-size="10" fill="#8892a4">1100</text>
  <text x="748" y="296" font-family="system-ui, sans-serif" font-size="10" fill="#8892a4">900</text>
  <text x="748" y="356" font-family="system-ui, sans-serif" font-size="10" fill="#8892a4">700</text>
  <text x="748" y="416" font-family="system-ui, sans-serif" font-size="10" fill="#8892a4">500</text>
  <text x="748" y="502" font-family="system-ui, sans-serif" font-size="10" fill="#8892a4">0</text>

  <!-- Grid lines inside chart -->
  <line x1="775" y1="232" x2="1108" y2="232" stroke="#2e3248" stroke-width="0.5"/>
  <line x1="775" y1="292" x2="1108" y2="292" stroke="#2e3248" stroke-width="0.5"/>
  <line x1="775" y1="352" x2="1108" y2="352" stroke="#2e3248" stroke-width="0.5"/>
  <line x1="775" y1="412" x2="1108" y2="412" stroke="#2e3248" stroke-width="0.5"/>
  <line x1="775" y1="500" x2="1108" y2="500" stroke="#2e3248" stroke-width="0.5"/>

  <!-- Histogram bars (simulated realistic distribution) -->
  <!-- Bar heights scaled: max ~1050 → 255px, baseline at y=500 -->
  <!-- 20 bars, each 16px wide, 1px gap, start x=780 -->

  <!-- Bar data: simulating fairly uniform distribution with slight variation -->
  <rect x="778" y="260" width="15" height="240" rx="2" fill="url(#accentGrad)"/>
  <rect x="795" y="248" width="15" height="252" rx="2" fill="url(#accentGrad)"/>
  <rect x="812" y="272" width="15" height="228" rx="2" fill="url(#accentGrad)"/>
  <rect x="829" y="255" width="15" height="245" rx="2" fill="url(#accentGrad)"/>
  <rect x="846" y="244" width="15" height="256" rx="2" fill="url(#accentGrad)"/>
  <rect x="863" y="268" width="15" height="232" rx="2" fill="url(#accentGrad)"/>
  <rect x="880" y="252" width="15" height="248" rx="2" fill="url(#accentGrad)"/>
  <rect x="897" y="240" width="15" height="260" rx="2" fill="url(#accentGrad)"/>
  <rect x="914" y="262" width="15" height="238" rx="2" fill="url(#accentGrad)"/>
  <rect x="931" y="270" width="15" height="230" rx="2" fill="url(#accentGrad)"/>
  <rect x="948" y="246" width="15" height="254" rx="2" fill="url(#accentGrad)"/>
  <rect x="965" y="258" width="15" height="242" rx="2" fill="url(#accentGrad)"/>
  <rect x="982" y="236" width="15" height="264" rx="2" fill="url(#accentGrad)"/>
  <rect x="999" y="254" width="15" height="246" rx="2" fill="url(#accentGrad)"/>
  <rect x="1016" y="266" width="15" height="234" rx="2" fill="url(#accentGrad)"/>
  <rect x="1033" y="242" width="15" height="258" rx="2" fill="url(#accentGrad)"/>
  <rect x="1050" y="250" width="15" height="250" rx="2" fill="url(#accentGrad)"/>
  <rect x="1067" y="274" width="15" height="226" rx="2" fill="url(#accentGrad)"/>
  <rect x="1084" y="256" width="15" height="244" rx="2" fill="url(#accentGrad)"/>
  <rect x="1101" y="264" width="15" height="236" rx="2" fill="url(#accentGrad)"/>

  <!-- Chi-square result badge -->
  <rect x="740" y="520" width="380" height="28" rx="6" fill="#22c55e" opacity="0.12"/>
  <rect x="740" y="520" width="380" height="28" rx="6" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <circle cx="758" cy="534" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="770" y="539" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e" font-weight="500">Chi²-Test bestanden · p = 0.847 · gleichverteilt ✓</text>

  <!-- Bottom border line -->
  <line x1="80" y1="590" x2="1120" y2="590" stroke="#2e3248" stroke-width="1"/>

  <!-- Footer -->
  <text x="80" y="615" font-family="system-ui, sans-serif" font-size="13" fill="#8892a4">random-checker · Pseudozufallszahlen testen und analysieren</text>
  <text x="1120" y="615" font-family="system-ui, sans-serif" font-size="13" fill="#6366f1" text-anchor="end" font-weight="500">vergissberlin/random-checker</text>
</svg>
